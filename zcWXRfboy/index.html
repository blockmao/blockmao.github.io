                    <div class="gt-post-content post-abstract gt-c-content-color-second">
                        <p>作为开发人员，定位问题是我们的日常工作，而日志是我们定位问题非常重要的依据。传统方式定位问题时，往往是如下步骤：</p>
<ol>
<li>将日志级别设低，例如 DEBUG ；</li>
<li>重启应用；</li>
<li>复现问题，观察日志；</li>
</ol>
<p>实际上是可以动态修改日志级别，无需重启应用，立即生效。</p>
